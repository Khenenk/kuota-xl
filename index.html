<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XL Axis Premium</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:#e5e7eb;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:600;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* RUNNING TEXT */
.marquee{
  overflow:hidden;
  white-space:nowrap;
  margin-top:6px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:jalan 20s linear infinite;
  font-size:13px;
  color:#94a3b8;
}

@keyframes jalan{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:20px 0;
}

.menu a{
  padding:14px;
  border-radius:16px;
  text-align:center;
  text-decoration:none;
  font-size:13px;
  color:white;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
}

.menu a:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.1);
}

/* SELECT */
select{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
  margin-bottom:15px;
}

/* SEARCH */
.search-box{
  position:relative;
  margin-bottom:15px;
}

.search-box input{
  width:100%;
  padding:14px 45px 14px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
  transition:0.25s;
}

.search-box input:focus{
  border:1px solid #22c55e;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

.search-box span{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#94a3b8;
}

/* CARD */
.card{
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);
}

.best{
  border:1px solid #22c55e;
  box-shadow:0 0 15px rgba(34,197,94,0.25);
}

.price{
  font-size:20px;
  font-weight:600;
  color:#22c55e;
}

.label{
  font-size:12px;
  color:#94a3b8;
}

.detail{
  margin-top:10px;
  font-size:14px;
}

/* BUTTON */
.order{
  margin-top:12px;
  display:block;
  text-align:center;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}

.active{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
}

.disabled{
  background:#374151;
  color:#9ca3af;
  pointer-events:none;
}

/* NOTE */
.note{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#94a3b8;
}

/* BRAND */
.brand{
  margin-top:30px;
  text-align:center;
}

.brand small{
  display:block;
  font-size:11px;
  color:#64748b;
  margin-bottom:5px;
}

.brand strong{
  padding:6px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">XL AXIS PREMIUM</div>
  <div class="marquee">
    <span>⚡ Jika stok habis silahkan pesan ke admin | Update tiap hari jam 09:00 ⚡</span>
  </div>
</div>

<div class="menu">
  <a href="#">📍 Cek Area</a>
  <a href="#">👤 Admin</a>
  <a href="#">📦 Cek Stok</a>
  <a href="#">👥 Grup</a>
</div>

<select id="area" onchange="render()">
<option value="">Pilih Area Kamu</option>
<option value="1">Area 1</option>
<option value="2">Area 2</option>
<option value="3">Area 3</option>
<option value="4">Area 4</option>
</select>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari kode produk (contoh: XDA13)" onkeyup="render()">
  <span>🔍</span>
</div>

<div id="result"></div>

<div id="notfound" style="display:none;text-align:center;font-size:13px;color:#94a3b8;margin-top:10px;">
Produk tidak ditemukan
</div>

<div class="note">
✅ Resmi Bergaransi<br>
✅ Masa Aktif 28 Hari<br>
⚠️ Pastikan nomor benar
</div>

<div class="brand">
  <small>by MR.KHENENK • 2026</small>
</div>

</div>

<script>
const data = [
{
kode:"XDA13",
harga:50000,
label:"SUPERMINI",
best:false,
area:{1:"13GB",2:"15GB",3:"20GB",4:"30GB"}
},
{
kode:"XDA25",
harga:59000,
label:"",
best:false,
area:{1:"25GB",2:"27GB",3:"32GB",4:"42GB"}
},
{
kode:"XDA31",
harga:63000,
label:"MINI",
best:false,
area:{1:"31GB",2:"33GB",3:"38GB",4:"48GB"}
},
{
kode:"XDA38",
harga:68000,
label:"BEST DEAL 🔥",
best:true,
area:{1:"38GB",2:"40GB",3:"45GB",4:"55GB"}
},
{
kode:"XDA47",
harga:75000,
label:"",
best:false,
area:{1:"47GB",2:"49GB",3:"54GB",4:"64GB"}
},
{
kode:"XDA55",
harga:78000,
label:"JUMBO V2",
best:false,
area:{1:"55GB",2:"57GB",3:"61GB",4:"71GB"}
},
{
kode:"XDA63",
harga:90000,
label:"",
best:false,
area:{1:"63GB",2:"65GB",3:"70GB",4:"80GB"}
},
{
kode:"XDA88",
harga:105000,
label:"JUMBO V3",
best:false,
area:{1:"88GB",2:"90GB",3:"95GB",4:"105GB"}
},
{
kode:"XDA64",
harga:110000,
label:"ULTRA",
best:false,
area:{1:"65GB",2:"70GB",3:"83GB",4:"123GB"}
}
];

function render(){
const area = document.getElementById("area").value;
const search = document.getElementById("search").value.toUpperCase();

let html="";
let found=false;

data.forEach(p=>{
if(search && !p.kode.includes(search)) return;

found=true;

const aktif = area ? "active" : "disabled";
const detail = area ? p.area[area] : "Pilih area dulu";
const highlight = search ? "best" : "";

html += `
<div class="card ${p.best ? 'best' : ''} ${highlight}">
<div class="price">Rp ${p.harga.toLocaleString()}</div>
<div class="label">${p.kode} ${p.label ? "• "+p.label : ""}</div>
<div class="detail">${detail}</div>
<a class="order ${aktif}" 
href="https://wa.me/?text=Saya mau ${p.kode} Rp${p.harga} ${detail} Area ${area}">
Order Sekarang</a>
</div>
`;
});

document.getElementById("result").innerHTML=html;
document.getElementById("notfound").style.display = found ? "none" : "block";
}

render();
</script>

</body>
</html>
